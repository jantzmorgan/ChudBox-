<!DOCTYPE html>
<html>
<head>
  <title>Chud Level Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="app">

    <section class="card">
      <h1>Chud Level<br>Detector</h1>

      <p class="subtitle">
        Enter a name and scan the official chud levels.
      </p>

      <input id="nameInput" type="text" placeholder="Type a name...">

      <button id="scanButton">Scan Chud Level</button>

      <div id="resultBox">
        <p id="resultText">Awaiting scan...</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
